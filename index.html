<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>AMBA JUMP</title>
<style>
  /* ===========================================================
     RESET & BASE
  =========================================================== */
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{
    width:100%; height:100%; overflow:hidden;
    background:#0a0a12;
    font-family:'Trebuchet MS','Segoe UI',Verdana,Arial,sans-serif;
    touch-action:manipulation;
    user-select:none;
  }
  #game-wrap{
    position:relative;
    width:100%; height:100%;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
  }
  canvas{
    display:block;
    background:#87ceeb;
    touch-action:none;
    image-rendering:-webkit-optimize-contrast;
  }

  /* ===========================================================
     MENU UTAMA
  =========================================================== */
  #menu-screen{
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    z-index:50;
    background:linear-gradient(180deg,#7fd6ff 0%,#bdeeff 45%,#ffe9a8 75%,#ffd27a 100%);
    overflow:hidden;
  }
  .title-wrap{
    position:relative;
    text-align:center;
    z-index:2;
    animation:titlePop .7s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes titlePop{
    0%{ transform:scale(.4) translateY(40px); opacity:0; }
    100%{ transform:scale(1) translateY(0); opacity:1; }
  }
  #game-title{
    font-size:clamp(42px,11vw,90px);
    font-weight:900;
    letter-spacing:2px;
    color:#ffb703;
    -webkit-text-stroke:4px #5c3a1e;
    text-stroke:4px #5c3a1e;
    text-shadow:
      0 6px 0 #a15c1c,
      0 10px 14px rgba(0,0,0,.35);
    line-height:1;
    transform:rotate(-3deg);
  }
  #game-subtitle{
    margin-top:6px;
    font-size:clamp(13px,3vw,18px);
    font-weight:700;
    color:#5c3a1e;
    letter-spacing:6px;
    opacity:.8;
  }
  #play-btn{
    margin-top:48px;
    padding:18px 64px;
    font-size:clamp(20px,5vw,28px);
    font-weight:900;
    letter-spacing:3px;
    color:#fff;
    background:linear-gradient(180deg,#ff9a3c 0%,#ff6b1a 100%);
    border:none;
    border-radius:60px;
    box-shadow:
      0 8px 0 #c74a00,
      0 14px 22px rgba(0,0,0,.28);
    cursor:pointer;
    transform:translateZ(0);
    animation:pulseBtn 1.6s ease-in-out infinite;
    -webkit-tap-highlight-color:transparent;
  }
  #play-btn:active{
    transform:translateY(6px);
    box-shadow:0 2px 0 #c74a00, 0 6px 10px rgba(0,0,0,.25);
  }
  @keyframes pulseBtn{
    0%,100%{ transform:scale(1); }
    50%{ transform:scale(1.045); }
  }
  #menu-character{
    position:relative;
    margin-top:26px;
    width:120px;
    height:auto;
    animation:bobChar 2.2s ease-in-out infinite;
    filter:drop-shadow(0 10px 10px rgba(0,0,0,.25));
    z-index:2;
  }
  @keyframes bobChar{
    0%,100%{ transform:translateY(0) rotate(-4deg); }
    50%{ transform:translateY(-16px) rotate(4deg); }
  }
  #menu-footer{
    position:absolute;
    bottom:18px;
    font-size:12px;
    color:#5c3a1e;
    opacity:.65;
    letter-spacing:1px;
  }

  /* ===========================================================
     HUD (Skor / High Score / Tombol Menu)
  =========================================================== */
  #hud{
    position:absolute; inset:0;
    pointer-events:none;
    z-index:30;
    display:none;
  }
  #score-display{
    position:absolute;
    top:22px; left:50%; transform:translateX(-50%);
    font-size:clamp(38px,10vw,58px);
    font-weight:900;
    color:#fff;
    -webkit-text-stroke:3px #3b2412;
    text-shadow:0 4px 0 rgba(0,0,0,.25);
  }
  #highscore-display{
    position:absolute;
    top:26px; right:18px;
    padding:8px 16px;
    background:rgba(0,0,0,.35);
    border-radius:14px;
    color:#ffd27a;
    font-weight:800;
    font-size:clamp(12px,3vw,15px);
    letter-spacing:.5px;
    backdrop-filter:blur(2px);
  }
  #highscore-display span{ color:#fff; }
  #menu-btn{
    position:absolute;
    top:20px; left:18px;
    width:46px; height:46px;
    border-radius:12px;
    background:rgba(0,0,0,.35);
    border:none;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:5px;
    cursor:pointer;
    pointer-events:auto;
    backdrop-filter:blur(2px);
  }
  #menu-btn span{
    width:22px; height:3px; border-radius:2px; background:#fff;
  }

  /* ===========================================================
     OVERLAY (Pause & Game Over) - dipakai bersama
  =========================================================== */
  .overlay{
    position:absolute; inset:0;
    display:none;
    align-items:center; justify-content:center;
    background:rgba(10,10,20,.55);
    z-index:40;
  }
  .overlay-panel{
    background:linear-gradient(180deg,#fff7e6,#ffe8bf);
    border-radius:28px;
    padding:36px 44px;
    text-align:center;
    box-shadow:0 18px 40px rgba(0,0,0,.35);
    min-width:260px;
    animation:panelPop .35s cubic-bezier(.34,1.56,.64,1) both;
    border:5px solid #a15c1c33;
  }
  @keyframes panelPop{
    0%{ transform:scale(.7); opacity:0; }
    100%{ transform:scale(1); opacity:1; }
  }
  .overlay-title{
    font-size:clamp(24px,6vw,32px);
    font-weight:900;
    color:#5c3a1e;
    margin-bottom:6px;
    letter-spacing:1px;
  }
  .overlay-sub{
    font-size:14px;
    color:#8a6a44;
    margin-bottom:22px;
  }
  .overlay-score{
    font-size:clamp(40px,10vw,54px);
    font-weight:900;
    color:#ff6b1a;
    margin-bottom:4px;
  }
  .overlay-best{
    font-size:14px;
    color:#8a6a44;
    margin-bottom:22px;
    font-weight:700;
  }
  .overlay-btn{
    display:block;
    width:100%;
    margin-top:14px;
    padding:14px 0;
    font-size:18px;
    font-weight:800;
    letter-spacing:1px;
    color:#fff;
    border:none;
    border-radius:40px;
    cursor:pointer;
  }
  .btn-primary{
    background:linear-gradient(180deg,#ff9a3c,#ff6b1a);
    box-shadow:0 6px 0 #c74a00;
  }
  .btn-primary:active{ transform:translateY(4px); box-shadow:0 2px 0 #c74a00; }
  .btn-secondary{
    background:linear-gradient(180deg,#8fd3ff,#4fb0e8);
    box-shadow:0 6px 0 #2a7ea8;
  }
  .btn-secondary:active{ transform:translateY(4px); box-shadow:0 2px 0 #2a7ea8; }

  .hidden{ display:none !important; }
</style>
</head>
<body>

<div id="game-wrap">

  <!-- ============ CANVAS UTAMA (tempat render game) ============ -->
  <canvas id="gameCanvas"></canvas>

  <!-- ============ MENU UTAMA ============ -->
  <div id="menu-screen">
    <div class="title-wrap">
      <div id="game-title">AMBA JUMP</div>
      <div id="game-subtitle">SELAMATKAN AMBA DARI KEJARAN RUDAL NGAWI!</div>
    </div>
    <img id="menu-character" src="" alt="Amba">
    <button id="play-btn">MAIN</button>
    <div id="menu-footer">Tap layar untuk melompat</div>
  </div>

  <!-- ============ HUD SAAT BERMAIN ============ -->
  <div id="hud">
    <button id="menu-btn" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <div id="score-display">0</div>
    <div id="highscore-display">TERBAIK: <span id="highscore-value">0</span></div>
  </div>

  <!-- ============ OVERLAY PAUSE ============ -->
  <div id="pause-overlay" class="overlay">
    <div class="overlay-panel">
      <div class="overlay-title">JEDA</div>
      <div class="overlay-sub">Permainan dihentikan sementara</div>
      <button id="resume-btn" class="overlay-btn btn-primary">LANJUTKAN</button>
      <button id="restart-from-pause-btn" class="overlay-btn btn-secondary">ULANGI</button>
    </div>
  </div>

  <!-- ============ OVERLAY GAME OVER ============ -->
  <div id="gameover-overlay" class="overlay">
    <div class="overlay-panel">
      <div class="overlay-title">GAME OVER</div>
      <div class="overlay-score" id="final-score">0</div>
      <div class="overlay-best">TERBAIK: <span id="final-highscore">0</span></div>
      <button id="restart-btn" class="overlay-btn btn-primary">MAIN LAGI</button>
      <button id="menu-from-over-btn" class="overlay-btn btn-secondary">MENU UTAMA</button>
    </div>
  </div>

</div>

<script>
/* =====================================================================
   AMBA JUMP
   Game arcade 2D bergaya Flappy Bird, dibuat dengan Vanilla JS + Canvas.
   Seluruh konstanta gameplay diletakkan di objek CONFIG agar mudah
   diubah tanpa perlu menyentuh logika inti.
===================================================================== */

/* ---------------------------------------------------------------------
   1. KONFIGURASI GLOBAL
--------------------------------------------------------------------- */
const CONFIG = {
  // --- Fisika pemain ---
  GRAVITY: 1650,          // percepatan jatuh (px/detik^2)
  JUMP_VELOCITY: -420,    // kecepatan lompat (px/detik, negatif = ke atas)
  MAX_FALL_SPEED: 900,    // batas kecepatan jatuh maksimum
  ROTATION_UP: -25,       // derajat rotasi saat melompat naik
  ROTATION_DOWN: 90,      // derajat rotasi maksimum saat jatuh

  // --- Ukuran pemain (relatif terhadap lebar canvas, biar responsif) ---
  PLAYER_WIDTH_RATIO: 0.14,
  PLAYER_MAX_WIDTH: 90,
  PLAYER_START_X_RATIO: 0.28,

  // --- Rintangan (pipa/batang pohon) ---
  PIPE_WIDTH_RATIO: 0.16,
  PIPE_MAX_WIDTH: 100,
  PIPE_GAP_MIN_RATIO: 0.32,
  PIPE_GAP_MAX_RATIO: 0.36,
  PIPE_SPEED_START: 220,
  PIPE_SPEED_MAX: 340,
  PIPE_SPEED_INCREASE_PER_SCORE: 3,
  PIPE_SPAWN_GAP_RATIO: 0.62,
  PIPE_EDGE_MARGIN_RATIO: 0.12,

  // --- Siklus waktu latar (pagi -> siang -> malam) ---
  DAY_CYCLE_DURATION: 60000, // 1 menit penuh (ms) untuk 1 siklus lengkap

  // --- Awan & burung ---
  CLOUD_COUNT: 4,
  BIRD_COUNT: 3,

  // --- Lain-lain ---
  GROUND_HEIGHT_RATIO: 0.14,
};

/* ---------------------------------------------------------------------
   2. STATE MESIN GAME (state machine sederhana)
--------------------------------------------------------------------- */
const GameState = { MENU:'MENU', PLAYING:'PLAYING', PAUSED:'PAUSED', GAMEOVER:'GAMEOVER' };
let currentState = GameState.MENU;

/* ---------------------------------------------------------------------
   3. REFERENSI ELEMEN DOM
--------------------------------------------------------------------- */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const menuScreen   = document.getElementById('menu-screen');
const playBtn      = document.getElementById('play-btn');
const menuCharImg  = document.getElementById('menu-character');

const hud               = document.getElementById('hud');
const scoreDisplay       = document.getElementById('score-display');

const menuBtn            = document.getElementById('menu-btn');

const pauseOverlay        = document.getElementById('pause-overlay');
const resumeBtn            = document.getElementById('resume-btn');
const restartFromPauseBtn  = document.getElementById('restart-from-pause-btn');

const gameoverOverlay   = document.getElementById('gameover-overlay');
const finalScoreEl       = document.getElementById('final-score');
const finalHighscoreEl   = document.getElementById('final-highscore');
const restartBtn         = document.getElementById('restart-btn');
const menuFromOverBtn    = document.getElementById('menu-from-over-btn');

function resizeCanvas(){
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvasWidth = window.innerWidth;
  canvasHeight = window.innerHeight;

  canvas.style.width = canvasWidth + 'px';
  canvas.style.height = canvasHeight + 'px';
  canvas.width = Math.floor(canvasWidth * dpr);
  canvas.height = Math.floor(canvasHeight * dpr);
  ctx.setTransform(dpr,0,0,dpr,0,0);

  if (player) {
    player.width = clamp(canvasWidth * CONFIG.PLAYER_WIDTH_RATIO, 0, CONFIG.PLAYER_MAX_WIDTH);
    player.height = player.width * (playerImage.naturalHeight / playerImage.naturalWidth || 1.77);
    player.x = canvasWidth * CONFIG.PLAYER_START_X_RATIO;
  }
}
window.addEventListener('resize', resizeCanvas);
window.addEventListener('orientationchange', resizeCanvas);

/* ---------------------------------------------------------------------
   6. UTIL
--------------------------------------------------------------------- */
function clamp(v,min,max){ return Math.max(min, Math.min(max,v)); }
function randRange(min,max){ return min + Math.random()*(max-min); }
function lerp(a,b,t){ return a + (b-a)*t; }
function lerpColor(c1, c2, t){
  const r = Math.round(lerp(c1[0], c2[0], t));
  const g = Math.round(lerp(c1[1], c2[1], t));
  const b = Math.round(lerp(c1[2], c2[2], t));
  return `rgb(${r},${g},${b})`;
}

/* ---------------------------------------------------------------------
   7. OBJEK PEMAIN
--------------------------------------------------------------------- */
let player = null;

function createPlayer(){
  const width = clamp(canvasWidth * CONFIG.PLAYER_WIDTH_RATIO, 0, CONFIG.PLAYER_MAX_WIDTH);
  const aspect = (playerImage.naturalHeight && playerImage.naturalWidth)
      ? playerImage.naturalHeight / playerImage.naturalWidth : 1.77;
  return {
    x: canvasWidth * CONFIG.PLAYER_START_X_RATIO,
    y: canvasHeight * 0.4,
    width: width,
    height: width * aspect,
    velocityY: 0,
    rotation: 0,
    flapTimer: 0,
  };
}

function jump(){
  if (currentState === GameState.PLAYING){
    player.velocityY = CONFIG.JUMP_VELOCITY;
    player.flapTimer = 0.15;
  }
}

function updatePlayer(dt){
  player.velocityY += CONFIG.GRAVITY * dt;
  player.velocityY = clamp(player.velocityY, CONFIG.JUMP_VELOCITY, CONFIG.MAX_FALL_SPEED);
  player.y += player.velocityY * dt;

  const targetRot = player.velocityY < 0 ? CONFIG.ROTATION_UP : clamp(player.velocityY/6, 0, CONFIG.ROTATION_DOWN);
  player.rotation = lerp(player.rotation, targetRot, dt*8);

  if (player.flapTimer > 0) player.flapTimer -= dt;

  if (player.y < 0){
    player.y = 0;
    player.velocityY = 0;
  }

  const groundY = canvasHeight - canvasHeight*CONFIG.GROUND_HEIGHT_RATIO;
  if (player.y + player.height >= groundY){
    player.y = groundY - player.height;
    triggerGameOver();
  }
}

function drawPlayer(){
  ctx.save();
  const cx = player.x + player.width/2;
  const cy = player.y + player.height/2;
  ctx.translate(cx, cy);
  ctx.rotate(player.rotation * Math.PI/180);
  const flapScale = player.flapTimer > 0 ? 1 + (player.flapTimer/0.15)*0.08 : 1;
  ctx.scale(flapScale, flapScale);
  if (playerImage.complete && playerImage.naturalWidth){
    ctx.drawImage(playerImage, -player.width/2, -player.height/2, player.width, player.height);
  } else {
    ctx.fillStyle = '#7a4a25';
    ctx.beginPath();
    ctx.arc(0,0, player.width/2, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

/* ---------------------------------------------------------------------
   8. RINTANGAN (PIPA / BATANG POHON)
--------------------------------------------------------------------- */
let pipes = [];
let pipeSpawnTimerDist = 0;

function currentPipeSpeed(){
  return Math.min(
    CONFIG.PIPE_SPEED_START + score * CONFIG.PIPE_SPEED_INCREASE_PER_SCORE,
    CONFIG.PIPE_SPEED_MAX
  );
}

function spawnPipe(){
  const width = clamp(canvasWidth * CONFIG.PIPE_WIDTH_RATIO, 0, CONFIG.PIPE_MAX_WIDTH);
  const groundY = canvasHeight - canvasHeight*CONFIG.GROUND_HEIGHT_RATIO;
  const margin = canvasHeight * CONFIG.PIPE_EDGE_MARGIN_RATIO;

  const gap = randRange(
    canvasHeight * CONFIG.PIPE_GAP_MIN_RATIO,
    canvasHeight * CONFIG.PIPE_GAP_MAX_RATIO
  );

  const gapTop = randRange(margin, groundY - margin - gap);

  pipes.push({
    x: canvasWidth + width,
    width: width,
    gapTop: gapTop,
    gapBottom: gapTop + gap,
    passed: false,
    hue: randRange(-8, 8),
  });
}

function updatePipes(dt){
  const speed = currentPipeSpeed();
  const groundY = canvasHeight - canvasHeight*CONFIG.GROUND_HEIGHT_RATIO;

  pipeSpawnTimerDist -= speed * dt;
  if (pipeSpawnTimerDist <= 0){
    spawnPipe();
    pipeSpawnTimerDist = canvasWidth * CONFIG.PIPE_SPAWN_GAP_RATIO;
  }

  for (let i = pipes.length - 1; i >= 0; i--){
    const p = pipes[i];
    p.x -= speed * dt;

    if (!p.passed && p.x + p.width < player.x){
      p.passed = true;
      score++;
      scoreDisplay.textContent = score;
      bumpScorePop();
    }

    if (p.x + p.width < -10){
      pipes.splice(i,1);
      continue;
    }

    const hitboxPad = player.width * 0.16;
    const px1 = player.x + hitboxPad;
    const px2 = player.x + player.width - hitboxPad;
    const py1 = player.y + hitboxPad;
    const py2 = player.y + player.height - hitboxPad;

    const overlapX = px2 > p.x && px1 < p.x + p.width;
    if (overlapX){
      const hitTop = py1 < p.gapTop;
      const hitBottom = py2 > p.gapBottom;
      if (hitTop || hitBottom){
        triggerGameOver();
      }
    }
  }
}

function drawPipes(){
  const groundY = canvasHeight - canvasHeight*CONFIG.GROUND_HEIGHT_RATIO;
  for (const p of pipes){
    drawPipeSegment(p.x, 0, p.width, p.gapTop, true, p.hue);
    drawPipeSegment(p.x, p.gapBottom, p.width, groundY - p.gapBottom, false, p.hue);
  }
}

function drawPipeSegment(x, y, w, h, isTop, hue){
  if (h <= 0) return;
  ctx.save();
  ctx.translate(x, y);

  const trunkColor     = `hsl(${28+hue}, 45%, 32%)`;
  const trunkShade     = `hsl(${28+hue}, 45%, 24%)`;
  const frondColor     = `hsl(${100+hue}, 45%, 38%)`;
  const frondShade     = `hsl(${100+hue}, 45%, 28%)`;
  const fruitColor     = `hsl(${18+hue}, 70%, 45%)`;
  const crownBaseColor = `hsl(${100+hue}, 35%, 30%)`;

  const crownH = Math.min(56, h*0.55); // tinggi area mahkota daun
  const trunkH = h - crownH;
  const trunkW = w * 0.55;
  const trunkX = (w - trunkW)/2;
  const overlap = 10; // batang sengaja dibuat menjorok masuk ke mahkota, biar tidak ada celah

  if (isTop){
    // Batang menggantung dari langit-langit, mahkota daun di ujung bawah (dekat celah)
    drawPalmTrunk(trunkX, 0, trunkW, trunkH + overlap, trunkColor, trunkShade);
    drawPalmCrown(w/2, trunkH, w, crownH, frondColor, frondShade, fruitColor, crownBaseColor, true);
  } else {
    // Batang tumbuh dari tanah, mahkota daun di ujung atas (dekat celah)
    drawPalmTrunk(trunkX, crownH - overlap, trunkW, trunkH + overlap, trunkColor, trunkShade);
    drawPalmCrown(w/2, crownH, w, crownH, frondColor, frondShade, fruitColor, crownBaseColor, false);
  }

  ctx.restore();
}

// Menggambar batang pohon sawit dengan tekstur ruas diagonal khasnya
function drawPalmTrunk(x, y, w, h, color, shade){
  if (h <= 0) return;
  ctx.fillStyle = color;
  ctx.fillRect(x, y, w, h);

  ctx.strokeStyle = shade;
  ctx.lineWidth = 2;
  const step = 14;
  for (let sy = y; sy < y+h; sy += step){
    ctx.beginPath();
    ctx.moveTo(x, Math.min(sy+step, y+h));
    ctx.lineTo(x+w, sy);
    ctx.stroke();
  }
}

// Menggambar mahkota daun sawit (pelepah melengkung) + crownshaft penghubung + tandan buah
// hanging = true -> daun mengarah ke bawah (rintangan atas), false -> mengarah ke atas (rintangan bawah)
function drawPalmCrown(cx, cy, totalW, crownH, frondColor, frondShade, fruitColor, crownBaseColor, hanging){
  const dir = hanging ? 1 : -1;
  const frondCount = 7;

  ctx.save();
  ctx.translate(cx, cy);

  // Pelepah daun, pangkalnya digeser sedikit (dir*4) supaya menyatu ke crownshaft, bukan ke titik nol persis
  for (let i=0; i<frondCount; i++){
    const angle = (-75 + (150/(frondCount-1))*i) * Math.PI/180;
    const len = crownH * 0.95;
    const tipX = Math.sin(angle) * (totalW*0.55);
    const tipY = dir * Math.cos(angle) * len;

    ctx.fillStyle = i%2===0 ? frondColor : frondShade;
    ctx.beginPath();
    ctx.moveTo(0, dir*4);
    ctx.quadraticCurveTo(tipX*0.5, dir*len*0.35, tipX, tipY);
    ctx.quadraticCurveTo(tipX*0.35, dir*len*0.55, 0, dir*4);
    ctx.closePath();
    ctx.fill();
  }

  // Crownshaft: bulatan penghubung di pangkal mahkota, menutup sambungan ke batang
  ctx.fillStyle = crownBaseColor;
  ctx.beginPath();
  ctx.ellipse(0, 0, totalW*0.22, crownH*0.22, 0, 0, Math.PI*2);
  ctx.fill();

  // Tandan buah sawit kecil menempel tepat di crownshaft
  ctx.fillStyle = fruitColor;
  ctx.beginPath();
  ctx.arc(-6, dir*8, 6, 0, Math.PI*2);
  ctx.arc(6, dir*11, 6, 0, Math.PI*2);
  ctx.arc(0, dir*15, 6, 0, Math.PI*2);
  ctx.fill();

  ctx.restore();
}

/* ---------------------------------------------------------------------
   9. LATAR BELAKANG: PANTAI + SIKLUS PAGI-SIANG-MALAM
--------------------------------------------------------------------- */
const SKY_PHASES = [
  { t:0.00, top:[255,183,120], bottom:[255,224,168], name:'dawn'  },
  { t:0.25, top:[110,190,255], bottom:[200,235,255], name:'day'   },
  { t:0.50, top:[255,140,90],  bottom:[255,196,130], name:'dusk'  },
  { t:0.75, top:[15,20,60],    bottom:[45,40,90],     name:'night' },
  { t:1.00, top:[255,183,120], bottom:[255,224,168], name:'dawn'  },
];

let dayTime = 0.15;

function updateDayCycle(dt){
  dayTime += dt / (CONFIG.DAY_CYCLE_DURATION/1000);
  if (dayTime >= 1) dayTime -= 1;
}

function getSkyColors(){
  for (let i=0;i<SKY_PHASES.length-1;i++){
    const a = SKY_PHASES[i], b = SKY_PHASES[i+1];
    if (dayTime >= a.t && dayTime <= b.t){
      const localT = (dayTime - a.t) / (b.t - a.t);
      return {
        top: lerpColor(a.top, b.top, localT),
        bottom: lerpColor(a.bottom, b.bottom, localT),
      };
    }
  }
  return { top:'rgb(110,190,255)', bottom:'rgb(200,235,255)' };
}

let clouds = [];
let birds = [];

function initSceneObjects(){
  clouds = Array.from({length:CONFIG.CLOUD_COUNT}, () => ({
    x: Math.random()*canvasWidth,
    y: randRange(canvasHeight*0.08, canvasHeight*0.32),
    scale: randRange(0.6,1.3),
    speed: randRange(8,18),
  }));
  birds = Array.from({length:CONFIG.BIRD_COUNT}, () => ({
    x: Math.random()*canvasWidth,
    y: randRange(canvasHeight*0.12, canvasHeight*0.3),
    speed: randRange(40,70),
    wingPhase: Math.random()*Math.PI*2,
  }));
}

function updateScene(dt){
  for (const c of clouds){
    c.x -= c.speed*dt;
    if (c.x < -120) c.x = canvasWidth + 120;
  }
  for (const b of birds){
    b.x -= b.speed*dt;
    b.wingPhase += dt*10;
    if (b.x < -60) b.x = canvasWidth + 60;
  }
}

function drawSky(){
  const {top, bottom} = getSkyColors();
  const grad = ctx.createLinearGradient(0,0,0,canvasHeight);
  grad.addColorStop(0, top);
  grad.addColorStop(1, bottom);
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,canvasWidth,canvasHeight);
}

function drawCelestialBody(){
  const arc = (t) => {
    const x = canvasWidth * (1 - t);
    const peak = canvasHeight*0.22;
    const y = canvasHeight*0.55 - Math.sin(t*Math.PI) * (canvasHeight*0.55 - peak);
    return {x,y};
  };

  const sunWindow = [0.0, 0.55];
  const moonWindow = [0.45, 1.0];

  if (dayTime >= sunWindow[0] && dayTime <= sunWindow[1]){
    const t = (dayTime - sunWindow[0])/(sunWindow[1]-sunWindow[0]);
    const pos = arc(t);
    const alpha = clamp(Math.min((t)*6, (1-t)*6),0,1);
    drawSun(pos.x,pos.y, alpha);
  }
  if (dayTime >= moonWindow[0] && dayTime <= moonWindow[1]){
    const t = (dayTime - moonWindow[0])/(moonWindow[1]-moonWindow[0]);
    const pos = arc(t);
    const alpha = clamp(Math.min((t)*6, (1-t)*6),0,1);
    drawMoon(pos.x,pos.y, alpha);
  }
}

function drawSun(x,y,alpha){
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = '#ffdd66';
  ctx.shadowColor = '#ffdd66';
  ctx.shadowBlur = 40;
  ctx.beginPath();
  ctx.arc(x,y,38,0,Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function drawMoon(x,y,alpha){
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = '#f4f3ea';
  ctx.shadowColor = '#c9c9ff';
  ctx.shadowBlur = 25;
  ctx.beginPath();
  ctx.arc(x,y,28,0,Math.PI*2);
  ctx.fill();
  ctx.globalAlpha = alpha*0.5;
  ctx.fillStyle = '#d8d6c8';
  ctx.beginPath(); ctx.arc(x-9,y-6,5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+7,y+8,4,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawStars(){
  const nightAlpha = clamp((dayTime - 0.6) * 4, 0, 1) * clamp((1.05 - dayTime)*4,0,1);
  if (nightAlpha <= 0) return;
  ctx.save();
  ctx.globalAlpha = nightAlpha * 0.9;
  ctx.fillStyle = '#fff';
  for (let i=0;i<40;i++){
    const sx = (i*97.13 % 1) * canvasWidth;
    const sy = (i*53.7 % 1) * canvasHeight * 0.5;
    const size = (i%3===0)?1.6:1;
    ctx.fillRect(sx, sy, size, size);
  }
  ctx.restore();
}

function drawClouds(){
  const nightAlpha = clamp((dayTime - 0.6) * 4, 0, 1) * clamp((1.05 - dayTime)*4,0,1);
  ctx.save();
  ctx.fillStyle = `rgba(255,255,255,${0.9 - nightAlpha*0.5})`;
  for (const c of clouds){
    drawCloudShape(c.x, c.y, c.scale);
  }
  ctx.restore();
}

function drawCloudShape(x,y,scale){
  ctx.save();
  ctx.translate(x,y);
  ctx.scale(scale,scale);
  ctx.beginPath();
  ctx.arc(0,0,20,0,Math.PI*2);
  ctx.arc(22,-10,26,0,Math.PI*2);
  ctx.arc(46,0,20,0,Math.PI*2);
  ctx.arc(22,10,22,0,Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function drawBirds(){
  const dayAlpha = 1 - clamp((dayTime-0.6)*3,0,1)*clamp((1.05-dayTime)*4,0,1);
  ctx.save();
  ctx.strokeStyle = `rgba(60,40,30,${0.8*dayAlpha})`;
  ctx.lineWidth = 2.4;
  ctx.lineCap = 'round';
  for (const b of birds){
    const flap = Math.sin(b.wingPhase) * 6;
    ctx.beginPath();
    ctx.moveTo(b.x-8, b.y - flap);
    ctx.quadraticCurveTo(b.x, b.y+4, b.x+8, b.y - flap);
    ctx.stroke();
  }
  ctx.restore();
}

let waveOffset = 0;
function updateWaves(dt){ waveOffset += dt * 40; }

function drawBeach(){
  const groundY = canvasHeight - canvasHeight*CONFIG.GROUND_HEIGHT_RATIO;
  const seaH = canvasHeight*CONFIG.GROUND_HEIGHT_RATIO*0.55;

  const nightAlpha = clamp((dayTime - 0.55) * 3, 0, 1) * clamp((1.05 - dayTime)*4,0,1);
  const darken = 1 - nightAlpha*0.45;

  const seaColor = `rgb(${Math.round(45*darken)},${Math.round(140*darken)},${Math.round(190*darken)})`;
  ctx.fillStyle = seaColor;
  ctx.fillRect(0, groundY, canvasWidth, seaH);

  ctx.save();
  ctx.strokeStyle = `rgba(255,255,255,${0.55*darken})`;
  ctx.lineWidth = 3;
  for (let row=0; row<2; row++){
    ctx.beginPath();
    const rowY = groundY + 10 + row*14;
    for (let x=-20;x<=canvasWidth+20;x+=20){
      const y = rowY + Math.sin((x+waveOffset+row*40)*0.05)*4;
      if (x===-20) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.stroke();
  }
  ctx.restore();

  const sandColor = `rgb(${Math.round(238*darken)},${Math.round(214*darken)},${Math.round(165*darken)})`;
  ctx.fillStyle = sandColor;
  ctx.fillRect(0, groundY+seaH, canvasWidth, canvasHeight-(groundY+seaH));

  ctx.fillStyle = `rgba(180,150,100,${0.5*darken})`;
  for (let i=0;i<14;i++){
    const dx = (i*137.5 % canvasWidth);
    const dy = groundY+seaH + ((i*77)%(canvasHeight-(groundY+seaH)-6)) + 4;
    ctx.fillRect(dx,dy,4,2);
  }
}

/* ---------------------------------------------------------------------
   10. SKOR & HIGH SCORE (hanya bertahan selama sesi/tab dibuka)
--------------------------------------------------------------------- */
let score = 0;
let highScore = 0;
let scorePopTimer = 0;

function bumpScorePop(){
  scorePopTimer = 0.18;
}

function applyScorePopAnim(){
  if (scorePopTimer > 0){
    const s = 1 + (scorePopTimer/0.18)*0.35;
    scoreDisplay.style.transform = `translateX(-50%) scale(${s})`;
  } else {
    scoreDisplay.style.transform = 'translateX(-50%) scale(1)';
  }
}

function resetScore(){
  score = 0;
  scoreDisplay.textContent = '0';
}

function updateHighScoreIfNeeded(){
  if (score > highScore){
    highScore = score;
    highscoreValueEl.textContent = highScore;
  }
}

/* ---------------------------------------------------------------------
   11. LOOP UTAMA GAME
--------------------------------------------------------------------- */
let lastTime = 0;

function gameLoop(timestamp){
  if (!lastTime) lastTime = timestamp;
  let dt = (timestamp - lastTime) / 1000;
  dt = Math.min(dt, 1/30);
  lastTime = timestamp;

  updateDayCycle(dt);
  updateScene(dt);
  updateWaves(dt);

  if (currentState === GameState.PLAYING){
    updatePlayer(dt);
    updatePipes(dt);
    if (scorePopTimer>0) scorePopTimer -= dt;
    applyScorePopAnim();
  }

  render();
  requestAnimationFrame(gameLoop);
}

function render(){
  ctx.clearRect(0,0,canvasWidth,canvasHeight);
  drawSky();
  drawStars();
  drawCelestialBody();
  drawClouds();
  drawBirds();
  drawBeach();

  if (currentState === GameState.PLAYING || currentState === GameState.PAUSED || currentState === GameState.GAMEOVER){
    drawPipes();
    if (player) drawPlayer();
  }
}

/* ---------------------------------------------------------------------
   12. TRANSISI ANTAR STATE
--------------------------------------------------------------------- */
function showScreen(el){ el.style.display = 'flex'; }
function hideScreen(el){ el.style.display = 'none'; }

function startGame(){
  currentState = GameState.PLAYING;
  hideScreen(menuScreen);
  hud.style.display = 'block';
  hideScreen(pauseOverlay);
  hideScreen(gameoverOverlay);

  resetScore();
  pipes = [];
  pipeSpawnTimerDist = canvasWidth * 0.9;
  player = createPlayer();
}

function pauseGame(){
  if (currentState !== GameState.PLAYING) return;
  currentState = GameState.PAUSED;
  showScreen(pauseOverlay);
}

function resumeGame(){
  if (currentState !== GameState.PAUSED) return;
  currentState = GameState.PLAYING;
  hideScreen(pauseOverlay);
  lastTime = 0;
}

function restartGame(){
  hideScreen(pauseOverlay);
  hideScreen(gameoverOverlay);
  startGame();
}

function triggerGameOver(){
  if (currentState !== GameState.PLAYING) return;
  currentState = GameState.GAMEOVER;
  updateHighScoreIfNeeded();
  finalScoreEl.textContent = score;
  finalHighscoreEl.textContent = highScore;
  showScreen(gameoverOverlay);
}

function backToMenu(){
  currentState = GameState.MENU;
  hideScreen(pauseOverlay);
  hideScreen(gameoverOverlay);
  hud.style.display = 'none';
  showScreen(menuScreen);
}

/* ---------------------------------------------------------------------
   13. INPUT HANDLING
--------------------------------------------------------------------- */
function handlePrimaryInput(e){
  if (currentState === GameState.PLAYING){
    e.preventDefault();
    jump();
  }
}
canvas.addEventListener('pointerdown', handlePrimaryInput);

window.addEventListener('keydown', (e)=>{
  if (e.code === 'Space' || e.code === 'ArrowUp'){
    e.preventDefault();
    if (currentState === GameState.PLAYING) jump();
  }
  if (e.code === 'Escape'){
    if (currentState === GameState.PLAYING) pauseGame();
    else if (currentState === GameState.PAUSED) resumeGame();
  }
});

playBtn.addEventListener('click', startGame);
menuBtn.addEventListener('click', pauseGame);
resumeBtn.addEventListener('click', resumeGame);
restartFromPauseBtn.addEventListener('click', restartGame);
restartBtn.addEventListener('click', restartGame);
menuFromOverBtn.addEventListener('click', backToMenu);

/* ---------------------------------------------------------------------
   14. INISIALISASI
--------------------------------------------------------------------- */
function init(){
  resizeCanvas();
  initSceneObjects();
  highscoreValueEl.textContent = '0';
  requestAnimationFrame(gameLoop);
}

window.addEventListener('load', init);
</script>
